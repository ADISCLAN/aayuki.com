<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title> Aayuki Export</title>
<link rel="stylesheet" href="style.css"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
/* Full-height chat layout */
.ai-wrap {
  padding-top: 72px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg2);
}
.ai-layout {
  flex: 1;
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
}

/* ── Sidebar ── */
.ai-sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  scrollbar-width: thin;
}
.sb-top {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.ai-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.ai-avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--indigo), var(--indigo2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  box-shadow: var(--sh-indigo);
  position: relative;
  flex-shrink: 0;
}
.online-dot {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--green);
  border: 2px solid var(--surface);
}
.ai-brand-name { font-size: .92rem; font-weight: 700; color: var(--text); }
.ai-brand-sub  { font-family: var(--fm); font-size: .54rem; letter-spacing: 1.5px; color: var(--green); margin-top: 2px; }
.powered-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 100px;
  background: rgba(79,70,229,.07);
  border: 1px solid rgba(79,70,229,.15);
  font-family: var(--fm);
  font-size: .56rem;
  letter-spacing: 1.5px;
  color: var(--indigo);
  text-transform: uppercase;
}
.sb-section { padding: 20px 20px 0; }
.sb-label {
  font-family: var(--fm);
  font-size: .56rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 12px;
  padding: 0 4px;
}
.cap-item {
  display: flex;
  gap: 11px;
  align-items: flex-start;
  padding: 11px 12px;
  border-radius: 10px;
  margin-bottom: 7px;
  background: var(--bg2);
  border: 1px solid var(--border);
  transition: border-color .2s, box-shadow .2s;
}
.cap-item:hover { border-color: rgba(79,70,229,.2); box-shadow: var(--sh-sm); }
.cap-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: rgba(79,70,229,.09);
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem;
  flex-shrink: 0;
}
.cap-text { font-size: .78rem; color: var(--muted); line-height: 1.5; }
.cap-text strong { color: var(--text); display: block; margin-bottom: 1px; font-size: .8rem; }

.topic-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 13px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  margin-bottom: 7px;
  transition: all .2s var(--ease);
  font-family: var(--f);
}
.topic-btn:hover { border-color: var(--indigo); color: var(--indigo); background: rgba(79,70,229,.04); }
.topic-btn i { color: var(--indigo); font-size: .85rem; flex-shrink: 0; }

.sb-contact {
  padding: 20px;
  margin-top: auto;
  border-top: 1px solid var(--border);
}
.sb-contact p { font-size: .78rem; color: var(--muted); line-height: 1.7; }
.sb-contact a { color: var(--indigo); }

/* ── Main chat ── */
.ai-main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-header {
  padding: 18px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--border);
}
.ch-left { display: flex; align-items: center; gap: 12px; }
.ch-title { font-size: .9rem; font-weight: 700; color: var(--text); }
.ch-sub { font-family: var(--fm); font-size: .55rem; letter-spacing: 1.5px; color: var(--muted2); margin-top: 2px; }
.clear-btn {
  font-family: var(--fm);
  font-size: .58rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  background: transparent;
  border: 1px solid var(--border2);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s;
}
.clear-btn:hover { border-color: var(--indigo); color: var(--indigo); }

/* Welcome card */
.welcome-card {
  margin: 24px 28px;
  background: linear-gradient(135deg, rgba(79,70,229,.06), rgba(13,148,136,.04));
  border: 1px solid rgba(79,70,229,.14);
  border-radius: 16px;
  padding: 24px 28px;
}
.wc-title { font-size: .97rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.wc-body { font-size: .85rem; color: var(--muted); line-height: 1.75; margin-bottom: 18px; }
.wc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.wc-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 11px 14px;
  cursor: pointer;
  text-align: left;
  transition: all .2s var(--ease);
  font-family: var(--f);
}
.wc-btn:hover { border-color: var(--indigo); box-shadow: var(--sh-sm); background: rgba(79,70,229,.02); }
.wc-btn-title { font-size: .82rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.wc-btn-sub { font-family: var(--fm); font-size: .55rem; letter-spacing: 1px; color: var(--indigo); }

/* Messages */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 0 28px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.msg { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
.msg.ai  { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bub {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: .875rem;
  line-height: 1.72;
}
.msg.ai .msg-bub {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  color: var(--text2);
  box-shadow: var(--sh-sm);
}
.msg.user .msg-bub {
  background: var(--indigo);
  color: #fff;
  border-radius: 14px 14px 4px 14px;
}
.msg-time {
  font-family: var(--fm);
  font-size: .52rem;
  letter-spacing: 1px;
  color: var(--muted2);
}
.msg.user .msg-time { text-align: right; }

/* Input area */
.input-area {
  flex-shrink: 0;
  padding: 14px 28px 18px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.quick-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.qb {
  font-family: var(--fm);
  font-size: .56rem;
  letter-spacing: 1px;
  padding: 5px 11px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
}
.qb:hover { border-color: var(--indigo); color: var(--indigo); background: rgba(79,70,229,.05); }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
.ai-inp {
  flex: 1;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--f);
  font-size: .875rem;
  padding: 11px 14px;
  outline: none;
  resize: none;
  max-height: 120px;
  transition: border-color .25s, box-shadow .25s, background .25s;
  line-height: 1.6;
}
.ai-inp::placeholder { color: var(--muted2); }
.ai-inp:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(79,70,229,.07); background: var(--surface); }
.send-btn {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--indigo);
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: .95rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sh-indigo);
  transition: all .2s var(--ease);
  flex-shrink: 0;
}
.send-btn:hover { background: var(--indigo2); box-shadow: 0 8px 24px rgba(79,70,229,.3); transform: translateY(-1px); }
.send-btn:disabled { opacity: .5; transform: none; box-shadow: none; }
.inp-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}
.inp-footer span { font-family: var(--fm); font-size: .53rem; letter-spacing: 1px; color: var(--muted2); }

@media(max-width:900px){
  .ai-layout { grid-template-columns: 1fr; }
  .ai-sidebar { display: none; }
}
</style>
</head>
